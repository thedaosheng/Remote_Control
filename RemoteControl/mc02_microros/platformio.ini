; =============================================================
; PlatformIO 配置文件 - 达妙 MC02 (STM32H723VGT6)
; micro-ROS + FreeRTOS + USB CDC + STM32Cube HAL
; =============================================================

[env:mc02]
; ===== 平台与框架 =====
platform = ststm32
framework = stm32cube
; Nucleo-H723ZG 作为基础板型（同 MCU 不同封装）
board = nucleo_h723zg

; ===== MCU 配置 =====
board_build.mcu = stm32h723vgt6
board_build.f_cpu = 550000000L

; ===== 烧录与调试 =====
upload_protocol = stlink
debug_tool = stlink
debug_init_break = tbreak main

; ===== 串口监视器 =====
monitor_speed = 115200

; ===== 编译选项 =====
build_flags =
    -std=gnu11
    ; libmicroros.a 使用 soft float 编译，必须匹配
    -mfloat-abi=soft
    ; MCU 与 HAL 宏定义
    -DSTM32H723xx
    -DUSE_HAL_DRIVER
    -DHSE_VALUE=25000000U
    ; 项目 Inc 目录
    -I$PROJECT_DIR/Inc
    ; micro-ROS
    -D_POSIX_TIMERS
    -DMICRO_ROS_TRANSPORT_CUSTOM
    -I.pio/libdeps/mc02/micro_ros_platformio/libmicroros/include
    ; USB CDC 库头文件
    -I$PROJECT_DIR/lib/USB_CDC/include
    -Os

; ===== micro-ROS =====
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio

board_microros_transport = custom
board_microros_distro = humble

